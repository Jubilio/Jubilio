name: Update latest YouTube videos

on:
  schedule:
    - cron: "15 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Update latest videos in README
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          comment_tag_name: "YOUTUBE"
          feed_list: "https://www.youtube.com/feeds/videos.xml?channel_id=UC5WrIVFLtSaZTP5EpC5Ah5g"
          max_post_count: "3"
          date_format: "mmm d, yyyy"
          template: "$newline- [$title]($url) ($date)"
